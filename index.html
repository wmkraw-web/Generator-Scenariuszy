<!DOCTYPE html>
<html lang="pl" translate="no" class="notranslate">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Scenariuszy AI PRO - EduBox AI</title>
    <!-- Biblioteki -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');
        
        body { background-color: #f1f5f9; font-family: 'Inter', sans-serif; }
        
        /* Stylistyka dokumentu A4 */
        .scenario-page {
            font-family: 'Lora', serif;
            line-height: 1.6;
            color: #1e293b;
        }

        @media print {
            body { background: white; }
            .print-hidden { display: none !important; }
            #scenario-container {
                border: none !important;
                box-shadow: none !important;
                padding: 0 !important;
                margin: 0 !important;
                width: 100% !important;
                max-width: 100% !important;
            }
            .page-break { page-break-before: always; }
            body, html { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .loader {
            border-top-color: #10b981;
            animation: spinner 1.5s linear infinite;
        }
        @keyframes spinner {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- KOMPONENT IKON (SVG) ---
        const Icon = ({ name, size = 20, className = "" }) => {
            const icons = {
                FileText: (
                    <>
                        <path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <line x1="10" y1="9" x2="8" y2="9"/>
                    </>
                ),
                Sparkles: <path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/>,
                Printer: <path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/>,
                Coffee: <path d="M18 8h1a4 4 0 0 1 0 8h-1M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8zM7 2v3M11 2v3M15 2v3"/>,
                Settings: <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2zM12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>,
                User: (
                    <>
                        <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </>
                ),
                Clock: (<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>),
                CheckCircle: (<><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>)
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name] || null}
                </svg>
            );
        };

        function App() {
            const [isPremium, setIsPremium] = useState(false);
            const [accessCode, setAccessCode] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);

            // Stan formularza
            const [params, setParams] = useState({
                topic: '',
                age: '5-6 latki (przedszkole)',
                duration: '45 minut',
                methods: 'Aktywizująca i ruchowa',
                needs: 'Standardowa grupa (brak orzeczeń)',
                customGoal: ''
            });

            // Stan wygenerowanego scenariusza (Rozbudowana struktura)
            const [scenario, setScenario] = useState({
                title: 'Temat Zajęć',
                duration: '45 minut',
                group: '5-6 lat',
                main_goal: 'Tutaj pojawi się cel główny oraz cele szczegółowe wygenerowane przez asystenta.',
                phases: [
                    { step_name: '1. Powitanie i krąg poranny', time: '5 minut', details: 'Nauczyciel zaprasza dzieci do kręgu. Piosenka powitalna na rozpoczęcie zajęć...' },
                    { step_name: '2. Rozgrzewka ruchowa', time: '5-7 minut', details: 'Zabawa ruchowa nawiązująca do tematu zajęć...' },
                    { step_name: '3. Część główna', time: '20-25 minut', details: 'A. Wprowadzenie z rekwizytem. \nB. Praca w grupach. \nC. Praca plastyczna/kreatywna...' },
                    { step_name: '4. Podsumowanie i refleksja', time: '5 minut', details: 'Dzieci siadają w kręgu, pokazują swoje prace i podsumowują czego się nauczyły.' }
                ],
                materials: ['Odtwarzacz muzyki', 'Kredki', 'Karty pracy'],
                integration: 'W tej sekcji AI opisze, z jakimi dziedzinami łączą się zajęcia (np. edukacja matematyczna, językowa).',
                weather_alternative: 'Alternatywne zabawy w razie złej lub dobrej pogody.',
                adjustments: 'Wskazówki dla dzieci ze specjalnymi potrzebami edukacyjnymi (SPE).'
            });

            const handleVerifyCode = () => {
                if (accessCode.toUpperCase() === 'KAWA2024') { 
                    setIsPremium(true); 
                    setAccessCode(''); 
                } else { 
                    alert('Błędny kod! Postaw kawę autorowi projektu.'); 
                }
            };

            const generateScenario = async () => {
                if (!params.topic.trim()) return alert('Proszę najpierw wpisać temat zajęć!');
                
                setIsGenerating(true);
                
                // MOCNY SYSTEM PROMPT - zapobiega halucynacjom językowym i wymusza strukturę JSON
                const systemPrompt = `Jesteś wybitnym metodykiem edukacji przedszkolnej i wczesnoszkolnej w Polsce. Tworzysz profesjonalne, szczegółowe scenariusze zajęć. 
                PISZ WYŁĄCZNIE W PERFEKCYJNYM, LITERACKIM JĘZYKU POLSKIM. Zwracaj ogromną uwagę na ortografię i gramatykę. Unikaj literówek, uciętych słów i dziwnych zlepków liter. Pisz logicznymi, pełnymi zdaniami.
                Zawsze odpowiadaj WYŁĄCZNIE czystym, poprawnym formatem JSON (bez dodawania markdowna na początku i na końcu). Struktura JSON MUSI być dokładnie taka:
                {
                  "title": "Temat zajęć",
                  "duration": "Czas trwania",
                  "group": "Wiek/grupa",
                  "main_goal": "Cel główny zajęć oraz 2-3 cele szczegółowe",
                  "phases": [
                    { "step_name": "1. Powitanie i krąg poranny", "time": "np. 5 min", "details": "Szczegółowy opis zabaw powitalnych" },
                    { "step_name": "2. Rozgrzewka ruchowa", "time": "np. 7 min", "details": "Opis piosenki i ruchów" },
                    { "step_name": "3. Część główna", "time": "np. 20 min", "details": "A. Wprowadzenie/Opowiadanie... B. Zabawa tematyczna... C. Praca plastyczna..." },
                    { "step_name": "4. Podsumowanie i refleksja", "time": "np. 5 min", "details": "Ewaluacja i piosenka na koniec" },
                    { "step_name": "5. Zakończenie", "time": "np. 2 min", "details": "Podziękowanie i relaksacja" }
                  ],
                  "materials": ["Lista", "środków", "dydaktycznych"],
                  "integration": "Opis integracji treści (matematyka, przyroda, sensoryka itp.)",
                  "weather_alternative": "Wersja na inną pogodę (np. spacer lub alternatywa na deszczowy dzień)",
                  "adjustments": "Dostosowanie do grupy (np. dla dzieci z krótszą koncentracją lub dzieci twórczych)"
                }`;

                const userPrompt = `Wygeneruj pełny, rozbudowany scenariusz zajęć dla nauczyciela. 
                Temat: ${params.topic}. 
                Grupa wiekowa: ${params.age}. 
                Przewidywany czas: ${params.duration}. 
                Główna metoda: ${params.methods}. 
                Specjalne potrzeby w grupie: ${params.needs}. 
                Moje dodatkowe wytyczne: ${params.customGoal}. 
                Pisz profesjonalnym językiem pedagogicznym. Faza główna powinna być podzielona na punkty A, B, C.`;

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ prompt: userPrompt, system: systemPrompt })
                    });
                    
                    const data = await res.json();
                    
                    // Oczyszczanie odpowiedzi z ewentualnych znaczników markdown (```json ... ```)
                    let cleanText = data.text;
                    if(cleanText.startsWith("```json")) {
                        cleanText = cleanText.replace(/```json/g, "").replace(/```/g, "").trim();
                    } else if (cleanText.startsWith("```")) {
                        cleanText = cleanText.replace(/```/g, "").trim();
                    }

                    const parsed = JSON.parse(cleanText);
                    setScenario(parsed);
                    
                } catch (error) {
                    console.error("Błąd podczas generowania:", error);
                    alert("Wystąpił błąd z serwerem AI lub formatem danych. Spróbuj kliknąć ponownie!");
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAWIGACJA */}
                    <nav className="bg-white border-b px-8 py-4 flex justify-between items-center print-hidden sticky top-0 z-50 shadow-sm">
                        <div className="flex items-center space-x-3 font-black text-2xl tracking-tight">
                            <div className="bg-emerald-600 p-2.5 rounded-xl text-white shadow-lg"><Icon name="FileText" size={24}/></div>
                            <span className="text-slate-800">Scenariusz<span className="text-emerald-600">AI</span> <span className="text-[10px] text-emerald-700 ml-1 font-bold bg-emerald-50 px-2 py-1 rounded-md border border-emerald-200 uppercase">Kombajn Pro</span></span>
                        </div>
                        <div className="flex items-center space-x-4">
                            {!isPremium && (
                                <div className="flex items-center space-x-2 bg-slate-50 p-1.5 rounded-xl border border-slate-200">
                                    <input value={accessCode} onChange={e => setAccessCode(e.target.value)} placeholder="Kod Premium..." className="p-2 bg-transparent text-sm w-32 outline-none font-medium"/>
                                    <button onClick={handleVerifyCode} className="p-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg transition-colors"><Icon name="Sparkles" size={16}/></button>
                                </div>
                            )}
                            <button onClick={() => window.open('[https://buycoffee.to/magiccolor](https://buycoffee.to/magiccolor)')} className="flex items-center space-x-2 bg-gradient-to-r from-amber-400 to-amber-500 hover:from-amber-500 hover:to-amber-600 text-amber-950 px-5 py-2.5 rounded-xl font-bold shadow-sm transition-all active:scale-95">
                                <Icon name="Coffee" size={20} /><span>Postaw Kawę</span>
                            </button>
                        </div>
                    </nav>

                    <div className="max-w-7xl mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-12 gap-8 w-full print:block print:p-0">
                        
                        {/* PANEL FORMULARZA */}
                        <div className="lg:col-span-4 space-y-6 print-hidden">
                            <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 space-y-5">
                                <h2 className="font-bold flex items-center text-slate-800 text-sm uppercase tracking-widest border-b pb-4"><Icon name="Settings" className="mr-2 text-emerald-500"/> Konfiguracja Zajęć</h2>
                                
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Temat lekcji / zajęć</label>
                                        <input 
                                            type="text" 
                                            value={params.topic} 
                                            onChange={e => setParams({...params, topic: e.target.value})} 
                                            placeholder="np. Wiosna budzi się do życia..." 
                                            className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-emerald-100 focus:border-emerald-500 transition-all font-semibold" 
                                        />
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Wiek / Grupa</label>
                                        <select 
                                            value={params.age} 
                                            onChange={e => setParams({...params, age: e.target.value})}
                                            className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none cursor-pointer focus:bg-white"
                                        >
                                            <option>3-4 latki (maluchy)</option>
                                            <option>5-6 latki (starszaki)</option>
                                            <option>Klasy I-III (wczesnoszkolna)</option>
                                            <option>Klasy IV-VIII (podstawowa)</option>
                                            <option>Szkoła Ponadpodstawowa</option>
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Czas trwania</label>
                                            <select value={params.duration} onChange={e => setParams({...params, duration: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                                                <option>15 minut</option>
                                                <option>30 minut</option>
                                                <option>45-50 minut</option>
                                                <option>60 minut</option>
                                                <option>90 minut</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Dominująca metoda</label>
                                            <select value={params.methods} onChange={e => setParams({...params, methods: e.target.value})} className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none">
                                                <option>Zabawa ruchowa</option>
                                                <option>Aktywizująca</option>
                                                <option>Pokazowa / Obrazowa</option>
                                                <option>Burza mózgów</option>
                                                <option>Metoda projektowa</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Dostosowanie (IPET/SPE)</label>
                                        <input 
                                            type="text" 
                                            value={params.needs} 
                                            onChange={e => setParams({...params, needs: e.target.value})} 
                                            className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm" 
                                            placeholder="np. dziecko z zaburzeniami integracji sensorycznej..." 
                                        />
                                    </div>

                                    <div>
                                        <label className="text-[10px] font-bold text-slate-400 uppercase ml-1">Twój cel (opcjonalnie)</label>
                                        <textarea 
                                            value={params.customGoal} 
                                            onChange={e => setParams({...params, customGoal: e.target.value})} 
                                            className="w-full mt-1 p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-sm h-20 resize-none" 
                                            placeholder="Co szczególnie chcesz zrealizować?"
                                        />
                                    </div>
                                </div>

                                <button 
                                    onClick={generateScenario} 
                                    disabled={isGenerating || (!isPremium && params.topic.length > 5)}
                                    className="w-full bg-emerald-600 hover:bg-emerald-700 text-white py-4 rounded-2xl font-black text-sm tracking-widest flex items-center justify-center space-x-3 shadow-lg transition-all active:scale-95 disabled:bg-slate-300 disabled:cursor-not-allowed"
                                >
                                    {isGenerating ? (
                                        <>
                                            <div className="w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>
                                            <span>UKŁADAM SCENARIUSZ...</span>
                                        </>
                                    ) : (
                                        <>
                                            <Icon name="Sparkles" size={20}/>
                                            <span>WYGENERUJ SCENARIUSZ</span>
                                        </>
                                    )}
                                </button>
                                
                                {!isPremium && <p className="text-[10px] text-slate-400 text-center italic">Wersja demonstracyjna (ograniczona). Kod Premium odblokuje pełną moc aplikacji.</p>}
                            </div>

                            <button onClick={() => window.print()} className="w-full bg-slate-800 hover:bg-slate-900 text-white py-4 rounded-2xl font-bold flex items-center justify-center space-x-3 transition-colors shadow-md">
                                <Icon name="Printer" size={20} /><span>DRUKUJ SCENARIUSZ</span>
                            </button>
                        </div>

                        {/* ARKUSZ PODGLĄDU SCENARIUSZA (A4) */}
                        <div className="lg:col-span-8 flex justify-center items-start overflow-x-auto pb-10">
                            <div id="scenario-container" className="bg-white w-full max-w-[210mm] min-h-[297mm] shadow-2xl p-12 md:p-16 scenario-page text-slate-900 relative">
                                
                                {/* Nagłówek wizualny */}
                                <div className="border-b-4 border-emerald-600 pb-8 mb-10">
                                    <div className="flex justify-between items-start text-[10px] text-slate-400 uppercase font-bold mb-8">
                                        <div className="space-y-1">
                                            <div>Data: ................................</div>
                                            <div>Prowadzący: ................................</div>
                                        </div>
                                    </div>
                                    
                                    <div className="text-sm font-bold text-emerald-600 tracking-widest uppercase mb-2">Temat Zajęć:</div>
                                    <h1 className="text-3xl md:text-4xl font-black text-slate-800 leading-tight mb-6">{scenario.title}</h1>
                                    
                                    <div className="flex flex-wrap gap-4 text-sm">
                                        <span className="bg-slate-100 px-4 py-2 rounded-lg font-semibold text-slate-700 flex items-center"><Icon name="Clock" size={16} className="mr-2 text-slate-500"/> Czas: {scenario.duration}</span>
                                        <span className="bg-slate-100 px-4 py-2 rounded-lg font-semibold text-slate-700 flex items-center"><Icon name="User" size={16} className="mr-2 text-slate-500"/> Grupa: {scenario.group}</span>
                                    </div>
                                </div>

                                {/* Treść właściwa */}
                                <div className="space-y-10">
                                    
                                    {/* CELE */}
                                    <section>
                                        <h2 className="text-lg font-black text-emerald-700 uppercase border-l-4 border-emerald-500 pl-4 mb-4">Cele zajęć</h2>
                                        <div className="pl-5">
                                            <div className="whitespace-pre-wrap text-slate-700">{scenario.main_goal}</div>
                                        </div>
                                    </section>

                                    {/* PRZEBIEG ZAJĘĆ */}
                                    <section>
                                        <h2 className="text-lg font-black text-emerald-700 uppercase border-l-4 border-emerald-500 pl-4 mb-6">Przebieg zajęć</h2>
                                        
                                        <div className="space-y-6 pl-2">
                                            {scenario.phases.map((phase, idx) => (
                                                <div key={idx} className="relative border-l-2 border-emerald-200 pl-6 pb-2">
                                                    {/* Kółko na osi czasu */}
                                                    <div className="absolute -left-[9px] top-1 w-4 h-4 bg-white border-2 border-emerald-500 rounded-full shadow-sm"></div>
                                                    
                                                    <div className="flex justify-between items-baseline mb-2 flex-wrap gap-2">
                                                        <h3 className="font-bold text-slate-800 text-base">{phase.step_name}</h3>
                                                        <span className="text-xs font-bold text-emerald-600 bg-emerald-50 px-3 py-1 rounded-full">{phase.time}</span>
                                                    </div>
                                                    
                                                    <div className="whitespace-pre-wrap text-slate-600 text-sm">{phase.details}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </section>

                                    {/* DODATKOWE WSKAZÓWKI (Z wzoru z Worda) */}
                                    <section className="bg-slate-50 rounded-2xl p-6 border border-slate-200 page-break-inside-avoid">
                                        <h2 className="text-base font-bold text-slate-800 uppercase flex items-center mb-6 border-b border-slate-200 pb-3">
                                            <Icon name="Settings" size={20} className="mr-2 text-slate-500" /> Dodatkowe wskazówki dla nauczyciela
                                        </h2>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* Materiały */}
                                            <div className="col-span-1 md:col-span-2">
                                                <h4 className="font-bold text-slate-700 mb-2 flex items-center text-sm"><Icon name="CheckCircle" size={16} className="mr-2 text-emerald-500"/> Materiały potrzebne:</h4>
                                                <ul className="list-disc pl-8 text-sm text-slate-600 italic columns-1 sm:columns-2 gap-4">
                                                    {scenario.materials.map((mat, i) => (
                                                        <li key={i} className="mb-1">{mat}</li>
                                                    ))}
                                                </ul>
                                            </div>

                                            {/* Integracja */}
                                            <div>
                                                <h4 className="font-bold text-slate-700 mb-2 text-sm">Integracja treści:</h4>
                                                <p className="text-sm text-slate-600">{scenario.integration}</p>
                                            </div>

                                            {/* Wersja na pogodę */}
                                            <div>
                                                <h4 className="font-bold text-slate-700 mb-2 text-sm">Wersja alternatywna:</h4>
                                                <p className="text-sm text-slate-600">{scenario.weather_alternative}</p>
                                            </div>

                                            {/* Dostosowanie */}
